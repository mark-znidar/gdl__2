# No positional encoding on PCQM4Mv2-Subset, GPS-small backbone — baseline for
# the PE-stability study. Identical to pcqm4m-subset-GPS+LapPE.yaml except
# (1) node_encoder_name drops the "+LapPE" suffix and (2) the posenc_LapPE
# block is removed. Intended to land in the same wandb project and
# results_pcqm4m_subset/stability_baselines/ tree as the +LapPE / +SNMLP /
# +SNDS / +LHKS siblings so the five methods can be compared directly.
out_dir: results_pcqm4m_subset
metric_best: mae
metric_agg: argmin
wandb:
  use: True
  project: pcqm4m-subset-stability-baselines
  entity: znidar-mark-stanford-university
dataset:
  format: OGB
  name: PCQM4Mv2-subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: Atom
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_bn: False
train:
  mode: custom
  batch_size: 256
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
model:
  type: GPSModel
  loss_fun: l1
  graph_pooling: mean
gt:
  layer_type: CustomGatedGCN+Transformer
  layers: 5
  n_heads: 4
  dim_hidden: 304
  dropout: 0.0
  attn_dropout: 0.5
  layer_norm: False
  batch_norm: True
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 304
  batchnorm: True
  act: relu
  dropout: 0.0
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 0.0
  base_lr: 0.0005
  max_epoch: 100
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
